name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Ubuntu is the full-coverage job (runs every test).
        # Windows is the Phase 7 parity probe — runs the Windows-
        # tagged smoke tests only, so a platform-specific regression
        # (path separators, NUL device, CRLF line endings) shows up
        # in CI instead of in production.
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      # Run each check script that exists in package.json.
      # Add `lint`, `validate`, and/or `test` scripts and they will be
      # exercised automatically — no workflow edits required.
      - name: Run checks
        shell: bash
        run: |
          FAILED=0
          for check in lint validate test; do
            if node -e "process.exit((require('./package.json').scripts||{})['$check']?0:1)" 2>/dev/null; then
              echo "::group::npm run $check"
              if ! npm run "$check"; then
                FAILED=1
              fi
              echo "::endgroup::"
            else
              echo "↷ skipping $check (not declared in package.json)"
            fi
          done
          exit $FAILED
