name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build, Lint, Validate & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      # Run each check script that exists in package.json.
      # Add `lint`, `validate`, and/or `test` scripts and they will be
      # exercised automatically — no workflow edits required.
      - name: Run checks
        run: |
          FAILED=0
          for check in lint validate test; do
            if node -e "process.exit((require('./package.json').scripts||{})['$check']?0:1)" 2>/dev/null; then
              echo "::group::npm run $check"
              if ! npm run "$check"; then
                FAILED=1
              fi
              echo "::endgroup::"
            else
              echo "↷ skipping $check (not declared in package.json)"
            fi
          done
          exit $FAILED
